kind = "web"
previewPath = "/"
title = "Darkom - Home & Furniture Marketplace Algeria"
version = "1.0.0"
id = "artifacts/darkom"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20495

[services.development]
run = "pnpm --filter @workspace/darkom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/darkom", "run", "build" ]
publicDir = "artifacts/darkom/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20495"
BASE_PATH = "/"
